<svg viewBox="0 0 24 20" width="576" height="480" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
<!-- Background -->
<rect width="24" height="20" fill="#1a1a2e"/>
<!-- Ears -->
<rect x="7" y="0" width="2" height="2" fill="#BDBDBD"/>
<rect x="15" y="0" width="2" height="2" fill="#BDBDBD"/>
<rect x="7" y="1" width="1" height="1" fill="#E0E0E0"/>
<rect x="16" y="1" width="1" height="1" fill="#E0E0E0"/>
<!-- Head -->
<rect x="6" y="2" width="12" height="6" fill="#E0E0E0"/>
<rect x="5" y="3" width="1" height="4" fill="#E0E0E0"/>
<rect x="18" y="3" width="1" height="4" fill="#E0E0E0"/>
<!-- Eyes (ice blue) -->
<rect x="8" y="5" width="2" height="1" fill="#81D4FA"/>
<rect x="14" y="5" width="2" height="1" fill="#81D4FA"/>
<rect x="8" y="4" width="2" height="1" fill="#E0E0E0"/>
<rect x="14" y="4" width="2" height="1" fill="#E0E0E0"/>
<!-- Nose -->
<rect x="11" y="6" width="2" height="1" fill="#81D4FA"/>
<!-- Body -->
<rect x="5" y="8" width="14" height="6" fill="#E0E0E0"/>
<rect x="6" y="8" width="12" height="6" fill="#EEEEEE"/>
<!-- Belly lighter -->
<rect x="8" y="9" width="8" height="4" fill="#F5F5F5"/>
<!-- Legs -->
<rect x="5" y="14" width="2" height="4" fill="#E0E0E0"/>
<rect x="8" y="14" width="2" height="4" fill="#E0E0E0"/>
<rect x="14" y="14" width="2" height="4" fill="#E0E0E0"/>
<rect x="17" y="14" width="2" height="4" fill="#E0E0E0"/>
<!-- Tail (forked) -->
<rect x="19" y="10" width="2" height="1" fill="#E0E0E0"/>
<rect x="20" y="9" width="1" height="3" fill="#E0E0E0"/>
<rect x="21" y="8" width="1" height="1" fill="#E0E0E0"/>
<rect x="21" y="11" width="1" height="1" fill="#E0E0E0"/>
<!-- Horn buds -->
<rect x="10" y="0" width="1" height="2" fill="#81D4FA"/>
<rect x="13" y="0" width="1" height="2" fill="#81D4FA"/>
<rect x="10" y="0" width="1" height="1" fill="#4FC3F7"/>
<rect x="13" y="0" width="1" height="1" fill="#4FC3F7"/>
<!-- Spirit glow -->
<rect x="3" y="6" width="1" height="1" fill="#81D4FA" opacity="0.4"/>
<rect x="20" y="6" width="1" height="1" fill="#81D4FA" opacity="0.4"/>
<rect x="2" y="12" width="1" height="1" fill="#81D4FA" opacity="0.3"/>
<rect x="21" y="14" width="1" height="1" fill="#81D4FA" opacity="0.3"/>
<rect x="11" y="16" width="2" height="1" fill="#81D4FA" opacity="0.3"/>
<!-- Shading -->
<rect x="5" y="12" width="1" height="2" fill="#BDBDBD"/>
<rect x="18" y="12" width="1" height="2" fill="#BDBDBD"/>
</svg>
