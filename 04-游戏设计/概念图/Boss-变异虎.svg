<svg viewBox="0 0 32 24" width="640" height="480" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
<!-- Background -->
<rect width="32" height="24" fill="#1a1a2e"/>
<!-- Ground -->
<rect x="0" y="22" width="32" height="2" fill="#424242"/>
<rect x="0" y="21" width="32" height="1" fill="#616161"/>
<!-- === Tiger Body === -->
<!-- Back / Top -->
<rect x="6" y="14" width="20" height="1" fill="#5D4037"/>
<!-- Main body mass -->
<rect x="5" y="15" width="22" height="5" fill="#BF9000"/>
<rect x="6" y="15" width="20" height="4" fill="#FFE082"/>
<rect x="7" y="16" width="18" height="3" fill="#FFC107"/>
<!-- Dark stripes on body -->
<rect x="9" y="15" width="1" height="4" fill="#5D4037"/>
<rect x="13" y="15" width="1" height="4" fill="#5D4037"/>
<rect x="17" y="15" width="1" height="4" fill="#5D4037"/>
<rect x="21" y="15" width="1" height="4" fill="#5D4037"/>
<!-- Scar on left shoulder (old wound) -->
<rect x="8" y="16" width="2" height="2" fill="#8B0000"/>
<rect x="8" y="17" width="2" height="1" fill="#5D4037"/>
<!-- Belly shadow -->
<rect x="7" y="19" width="18" height="1" fill="#827717"/>
<!-- === Head === -->
<rect x="3" y="11" width="2" height="1" fill="#5D4037"/>
<rect x="2" y="12" width="4" height="1" fill="#5D4037"/>
<rect x="2" y="13" width="5" height="3" fill="#FFE082"/>
<rect x="3" y="13" width="3" height="2" fill="#FFC107"/>
<!-- Ears -->
<rect x="4" y="10" width="1" height="1" fill="#5D4037"/>
<rect x="6" y="10" width="1" height="1" fill="#5D4037"/>
<!-- Eyes (amber, cold) -->
<rect x="3" y="14" width="1" height="1" fill="#FFB300"/>
<rect x="5" y="14" width="1" height="1" fill="#FFB300"/>
<rect x="3" y="14" width="1" height="1" fill="#FFE082"/>
<!-- Snout -->
<rect x="1" y="15" width="2" height="1" fill="#FFE082"/>
<!-- Fangs -->
<rect x="1" y="16" width="1" height="1" fill="#FAFAFA"/>
<rect x="3" y="16" width="1" height="1" fill="#FAFAFA"/>
<!-- Nose -->
<rect x="1" y="15" width="1" height="1" fill="#424242"/>
<!-- === Front legs === -->
<rect x="7" y="20" width="2" height="2" fill="#FFE082"/>
<rect x="7" y="20" width="2" height="1" fill="#FFC107"/>
<rect x="7" y="22" width="2" height="1" fill="#5D4037"/>
<!-- Claws front -->
<rect x="6" y="22" width="1" height="1" fill="#FAFAFA"/>
<rect x="9" y="22" width="1" height="1" fill="#FAFAFA"/>
<!-- === Back legs === -->
<rect x="20" y="20" width="3" height="2" fill="#FFE082"/>
<rect x="20" y="20" width="3" height="1" fill="#FFC107"/>
<rect x="20" y="22" width="3" height="1" fill="#5D4037"/>
<!-- Claws back -->
<rect x="19" y="22" width="1" height="1" fill="#FAFAFA"/>
<rect x="23" y="22" width="1" height="1" fill="#FAFAFA"/>
<!-- === Tail === -->
<rect x="26" y="14" width="2" height="1" fill="#5D4037"/>
<rect x="27" y="15" width="2" height="1" fill="#FFE082"/>
<rect x="28" y="16" width="2" height="1" fill="#FFC107"/>
<rect x="29" y="17" width="2" height="1" fill="#5D4037"/>
<rect x="30" y="18" width="1" height="1" fill="#FFE082"/>
<!-- Metallic armor sheen on back -->
<rect x="11" y="14" width="2" height="1" fill="#FFF59D"/>
<rect x="15" y="14" width="2" height="1" fill="#FFF59D"/>
<rect x="19" y="14" width="2" height="1" fill="#FFF59D"/>
<!-- === Aura / Pressure === -->
<rect x="0" y="0" width="1" height="1" fill="#FFB300" opacity="0.15"/>
<rect x="31" y="0" width="1" height="1" fill="#FFB300" opacity="0.15"/>
<rect x="0" y="23" width="1" height="1" fill="#FFB300" opacity="0.15"/>
<rect x="31" y="23" width="1" height="1" fill="#FFB300" opacity="0.15"/>
<rect x="10" y="20" width="12" height="1" fill="#FFB300" opacity="0.2"/>
<!-- Shadow under body -->
<rect x="5" y="21" width="22" height="1" fill="#212121" opacity="0.5"/>
</svg>
